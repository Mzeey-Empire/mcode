name: Build Release

on:
  release:
    types: [published]

  # Allow manual trigger for testing the workflow
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (e.g. v0.1.0). Leave empty to build without uploading."
        required: false

permissions:
  contents: write

jobs:
  build:
    # Skip nightly per-build releases: the dedicated `nightly-desktop.yml`
    # workflow handles those. Without this guard, the `release: published`
    # event fired by `gh release create v<x>-nightly.<...>` would also run
    # this workflow and upload stable-channel artifacts into the nightly
    # release.
    if: ${{ !contains(github.event.release.tag_name, '-nightly.') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-4vcpu-windows-2025
            build-args: ""
            target-arch: ""
          - os: ubuntu-22.04
            build-args: ""
            target-arch: ""
          - os: blacksmith-12vcpu-macos-26
            build-args: "--mac --arm64"
            target-arch: "arm64"
          - os: blacksmith-12vcpu-macos-26
            build-args: "--mac --x64"
            target-arch: "x64"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build main & renderer
        run: bun run --cwd apps/desktop build

      - name: Generate V8 snapshot
        run: bun apps/desktop/scripts/generate-snapshot.mjs
        env:
          MCODE_TARGET_ARCH: ${{ matrix.target-arch }}

      - name: Install Python setuptools (node-gyp on Python 3.12+ needs it)
        shell: bash
        run: python3 -m pip install setuptools --break-system-packages 2>/dev/null || python3 -m pip install setuptools 2>/dev/null || pip install setuptools 2>/dev/null || true

      - name: Package with electron-builder
        run: node apps/desktop/scripts/ci-package.mjs ${{ matrix.build-args }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'false' || '' }}

      - name: Smoke test packaged server
        if: matrix.target-arch == '' || matrix.target-arch == 'arm64'
        run: node apps/desktop/scripts/smoke-test.mjs

      # macOS: upload latest-mac.yml as a workflow artifact (merged later)
      - name: Upload macOS update metadata
        if: matrix.target-arch == 'arm64' || matrix.target-arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-yml-${{ matrix.target-arch }}
          path: apps/desktop/release/latest-mac.yml
          retention-days: 1

      - name: Collect release artifacts
        if: github.event.release.tag_name || inputs.tag
        id: artifacts
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          shopt -s nullglob
          files=()
          # Only collect top-level release artifacts. Exclude *-unpacked dirs
          # (contain bare executables without supporting files) and NSIS helpers
          # like elevate.exe that are not distributable artifacts.
          for f in \
            apps/desktop/release/*.exe \
            apps/desktop/release/*.exe.blockmap \
            apps/desktop/release/*.dmg \
            apps/desktop/release/*.dmg.blockmap \
            apps/desktop/release/*.zip \
            apps/desktop/release/*.zip.blockmap \
            apps/desktop/release/*.AppImage \
            apps/desktop/release/*.deb \
            apps/desktop/release/latest.yml \
            apps/desktop/release/latest-linux.yml; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            # Skip NSIS helper binaries
            [[ "$base" == "elevate.exe" ]] && continue
            files+=("$f")
          done

          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found to upload"
            exit 0
          fi

          printf '%s\n' "${files[@]}"
          printf '%s\n' "${files[@]}" > artifact-list.txt
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        if: steps.artifacts.outputs.count > 0
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r f; do
            echo "Uploading: $f"
            gh release upload "${{ steps.artifacts.outputs.tag }}" "$f" --clobber
          done < artifact-list.txt

  # Merge the two arch-specific latest-mac.yml files into one combined file
  # so electron-updater resolves the correct binary for each architecture.
  merge-mac-yml:
    needs: build
    # Same nightly-tag exclusion as the `build` job (this job would otherwise
    # try to upload `latest-mac.yml` into a nightly release).
    if: ${{ (github.event.release.tag_name || inputs.tag) && !contains(github.event.release.tag_name, '-nightly.') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Download arm64 yml
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: latest-mac-yml-arm64
          path: yml-arm64

      - name: Download x64 yml
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: latest-mac-yml-x64
          path: yml-x64

      - name: Merge latest-mac.yml
        shell: bash
        run: |
          ARM64_YML="yml-arm64/latest-mac.yml"
          X64_YML="yml-x64/latest-mac.yml"

          if [ ! -f "$ARM64_YML" ] || [ ! -f "$X64_YML" ]; then
            echo "One or both yml files missing, skipping merge"
            if [ -f "$ARM64_YML" ]; then cp "$ARM64_YML" latest-mac.yml; fi
            if [ -f "$X64_YML" ]; then cp "$X64_YML" latest-mac.yml; fi
            if [ ! -f latest-mac.yml ]; then exit 0; fi
          else
            node -e "
              const fs = require('fs');
              const arm64 = fs.readFileSync('$ARM64_YML', 'utf8');
              const x64 = fs.readFileSync('$X64_YML', 'utf8');

              function parseFiles(yml) {
                const lines = yml.split('\n');
                const files = [];
                let inFiles = false;
                let current = null;
                for (const line of lines) {
                  if (line.startsWith('files:')) { inFiles = true; continue; }
                  if (inFiles) {
                    if (line.match(/^  - url:/)) {
                      if (current) files.push(current);
                      current = line + '\n';
                    } else if (line.match(/^    \w/) && current) {
                      current += line + '\n';
                    } else if (line.match(/^\w/) && line.trim()) {
                      if (current) files.push(current);
                      current = null;
                      inFiles = false;
                    } else if (current) {
                      current += line + '\n';
                    }
                  }
                }
                if (current) files.push(current);
                return files;
              }

              const arm64Files = parseFiles(arm64);
              const x64Files = parseFiles(x64);

              const arm64Urls = new Set(arm64Files.map(f => {
                const m = f.match(/url:\s*(.+)/);
                return m ? m[1].trim() : '';
              }));

              const newEntries = x64Files.filter(f => {
                const m = f.match(/url:\s*(.+)/);
                return m && !arm64Urls.has(m[1].trim());
              });

              if (newEntries.length === 0) {
                fs.writeFileSync('latest-mac.yml', arm64);
              } else {
                const lines = arm64.split('\n');
                const out = [];
                let insertedExtra = false;
                let inFilesBlock = false;

                for (let i = 0; i < lines.length; i++) {
                  out.push(lines[i]);
                  if (lines[i].startsWith('files:')) {
                    inFilesBlock = true;
                  }
                  if (inFilesBlock && i > 0 && lines[i].match(/^\w/) && lines[i].trim() && !lines[i].startsWith('files:')) {
                    if (!insertedExtra) {
                      const lastLine = out.pop();
                      for (const entry of newEntries) {
                        out.push(entry.trimEnd());
                      }
                      out.push(lastLine);
                      insertedExtra = true;
                    }
                    inFilesBlock = false;
                  }
                }
                if (inFilesBlock && !insertedExtra) {
                  for (const entry of newEntries) {
                    out.push(entry.trimEnd());
                  }
                }
                fs.writeFileSync('latest-mac.yml', out.join('\n'));
              }
              console.log('Merged latest-mac.yml:');
              console.log(fs.readFileSync('latest-mac.yml', 'utf8'));
            "
          fi

      - name: Upload merged latest-mac.yml
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -f latest-mac.yml ]; then
            echo "Uploading merged latest-mac.yml"
            gh release upload "$tag" latest-mac.yml --clobber --repo "${{ github.repository }}"
          fi
