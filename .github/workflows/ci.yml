name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-desktop:
    name: Lint Desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/desktop typecheck

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web lint
      - run: bun run --cwd apps/web typecheck

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web test

  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/server test

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web build
      - run: bun run --cwd apps/desktop build

      - name: Generate V8 snapshot
        run: bun apps/desktop/scripts/generate-snapshot.mjs
